<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Raabta Task Manager — Sign In</title>
<meta name="description" content="Sign in to Raabta Task Manager — Premium task delegation and checklist platform."/>
<link rel="icon" type="image/png" href="/raabta-logo.png"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@700;800;900&display=swap" rel="stylesheet"/>
<style>
  /* ══════════════════════════════════════════════
     DESIGN TOKENS — 3D Blue Vanish Palette
  ══════════════════════════════════════════════ */
  :root {
    --deep:    #010C18;
    --dark:    #040F1F;
    --navy:    #071428;
    --mid:     #0D1E3D;
    --primary: #1255CC;
    --electric:#2979FF;
    --glow:    #448AFF;
    --sky:     #82B1FF;
    --foam:    #BBDEFB;
    --white:   #FFFFFF;
    --vanish:  rgba(41,121,255,0);

    --card-bg: rgba(8,20,50,0.72);
    --border:  rgba(41,121,255,0.22);
    --border-hover: rgba(68,138,255,0.55);
    --input-bg:rgba(6,16,40,0.75);
  }

  *{margin:0;padding:0;box-sizing:border-box;}

  /* ── BODY — deep space background ── */
  body {
    font-family:'Inter',sans-serif;
    background: var(--deep);
    min-height:100vh;
    display:flex;align-items:center;justify-content:center;
    overflow:hidden;
    position:relative;
  }

  /* ── ANIMATED BACKGROUND — layered orbs ── */
  .bg-canvas {
    position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none;
  }
  .orb {
    position:absolute;border-radius:50%;filter:blur(70px);
    animation:orbFloat 14s ease-in-out infinite;
    will-change:transform;
  }
  .orb1 {
    width:520px;height:520px;top:-160px;left:-160px;
    background:radial-gradient(circle at 40% 40%,rgba(18,85,204,0.45),rgba(41,121,255,0.08) 60%,transparent 100%);
    animation-duration:16s;
  }
  .orb2 {
    width:400px;height:400px;bottom:-120px;right:-120px;
    background:radial-gradient(circle at 60% 60%,rgba(41,121,255,0.35),rgba(68,138,255,0.06) 60%,transparent 100%);
    animation-duration:20s;animation-delay:-6s;
  }
  .orb3 {
    width:240px;height:240px;top:50%;left:60%;transform:translate(-50%,-50%);
    background:radial-gradient(circle,rgba(130,177,255,0.12),transparent 70%);
    animation-duration:12s;animation-delay:-3s;
  }
  @keyframes orbFloat {
    0%,100%{transform:translate(0,0) scale(1);}
    33%{transform:translate(30px,-20px) scale(1.04);}
    66%{transform:translate(-18px,28px) scale(0.97);}
  }

  /* Subtle grid overlay */
  .bg-grid {
    position:fixed;inset:0;z-index:0;pointer-events:none;
    background-image:
      linear-gradient(rgba(41,121,255,0.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(41,121,255,0.035) 1px, transparent 1px);
    background-size:48px 48px;
  }

  /* ── WRAPPER ── */
  .wrap {
    position:relative;z-index:10;
    width:100%;max-width:440px;padding:16px;
  }

  /* ── BRAND HEADER ── */
  .brand {
    text-align:center;margin-bottom:28px;
    animation:fadeDown .7s cubic-bezier(.34,1.56,.64,1) both;
  }
  .brand-logo-ring {
    width:76px;height:76px;border-radius:22px;margin:0 auto 14px;
    background:linear-gradient(135deg,var(--primary),var(--electric));
    display:grid;place-items:center;position:relative;
    box-shadow:
      0 0 0 1px rgba(41,121,255,0.5),
      0 0 32px rgba(41,121,255,0.4),
      0 0 80px rgba(41,121,255,0.15),
      inset 0 1px 0 rgba(255,255,255,0.12);
    animation:logoPulse 3s ease-in-out infinite;
  }
  @keyframes logoPulse {
    0%,100%{box-shadow:0 0 0 1px rgba(41,121,255,0.5),0 0 32px rgba(41,121,255,0.4),0 0 80px rgba(41,121,255,0.15),inset 0 1px 0 rgba(255,255,255,0.12);}
    50%{box-shadow:0 0 0 2px rgba(68,138,255,0.7),0 0 50px rgba(68,138,255,0.55),0 0 100px rgba(41,121,255,0.2),inset 0 1px 0 rgba(255,255,255,0.18);}
  }
  .brand-logo-ring img {
    width:100%;height:100%;border-radius:20px;object-fit:contain;background:#000;
  }
  .brand-logo-ring .logo-fallback {
    font-family:'Outfit',sans-serif;font-weight:900;font-size:26px;color:#fff;letter-spacing:-1px;
  }
  .brand-name {
    font-family:'Outfit',sans-serif;font-weight:900;font-size:26px;
    color:var(--white);letter-spacing:-0.5px;line-height:1;
    background:linear-gradient(135deg,#fff 0%,var(--sky) 60%,var(--glow) 100%);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  }
  .brand-sub {
    margin-top:5px;font-size:12px;font-weight:500;letter-spacing:3px;
    color:var(--sky);text-transform:uppercase;opacity:0.7;
  }

  /* ── CARD — glassmorphism 3D depth ── */
  .card {
    background:var(--card-bg);
    border:1px solid var(--border);
    border-radius:24px;
    padding:36px 32px 32px;
    backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px);
    box-shadow:
      0 2px 0 0 rgba(68,138,255,0.15) inset,
      0 32px 80px rgba(1,12,24,0.7),
      0 8px 32px rgba(18,85,204,0.2),
      0 0 0 1px rgba(41,121,255,0.08);
    position:relative;overflow:hidden;
    animation:cardIn .65s cubic-bezier(.34,1.56,.64,1) .1s both;
  }
  /* Shimmer sweep on card top edge */
  .card::before {
    content:'';position:absolute;
    top:0;left:-100%;width:80%;height:1px;
    background:linear-gradient(90deg,transparent,rgba(68,138,255,0.8),transparent);
    animation:edgeSweep 3.5s ease 1s 2;
  }
  @keyframes edgeSweep {
    0%{left:-100%;}100%{left:180%;}
  }

  @keyframes cardIn {
    from{opacity:0;transform:translateY(28px) scale(.96);}
    to{opacity:1;transform:translateY(0) scale(1);}
  }
  @keyframes fadeDown {
    from{opacity:0;transform:translateY(-20px);}
    to{opacity:1;transform:translateY(0);}
  }

  /* ── CARD HEADING ── */
  .card-title {font-size:20px;font-weight:700;color:var(--white);margin-bottom:3px;}
  .card-sub {font-size:13px;color:rgba(130,177,255,0.65);margin-bottom:24px;}

  /* ── FORM ── */
  .form-group {margin-bottom:16px;}
  label {
    display:block;font-size:11px;font-weight:700;letter-spacing:.7px;
    text-transform:uppercase;color:rgba(130,177,255,0.7);margin-bottom:6px;
  }
  .input-wrap {position:relative;}
  .input-icon {
    position:absolute;left:13px;top:50%;transform:translateY(-50%);
    font-size:15px;color:rgba(68,138,255,0.5);pointer-events:none;
    transition:color .2s;
  }
  input {
    width:100%;
    padding:12px 14px 12px 40px;
    background:var(--input-bg);
    border:1.5px solid rgba(41,121,255,0.18);
    border-radius:12px;
    font-size:14px;font-family:'Inter',sans-serif;
    color:var(--white);outline:none;
    transition:border .2s,box-shadow .2s,background .2s;
  }
  input::placeholder{color:rgba(130,177,255,0.3);}
  input:focus {
    border-color:var(--electric);
    background:rgba(6,20,55,0.9);
    box-shadow:0 0 0 3px rgba(41,121,255,0.18),0 0 20px rgba(41,121,255,0.12);
  }
  input:focus ~ .input-icon,
  .input-wrap:focus-within .input-icon { color:var(--glow); }

  /* ── ERROR ── */
  .error {
    display:none;background:rgba(220,38,38,0.1);
    border:1px solid rgba(220,38,38,0.3);
    color:#fca5a5;padding:10px 14px;
    border-radius:10px;font-size:13px;margin-bottom:14px;
    animation:shake .35s ease;
  }
  @keyframes shake {
    0%,100%{transform:translateX(0);}
    25%{transform:translateX(-6px);}
    75%{transform:translateX(6px);}
  }

  /* ── BUTTON ── */
  .btn-login {
    width:100%;padding:13px;margin-top:4px;
    background:linear-gradient(135deg,var(--primary) 0%,var(--electric) 100%);
    color:#fff;border:none;border-radius:12px;
    font-size:15px;font-weight:700;font-family:'Inter',sans-serif;
    cursor:pointer;position:relative;overflow:hidden;
    transition:transform .2s,box-shadow .2s;
    box-shadow:0 4px 20px rgba(41,121,255,0.4),0 0 0 1px rgba(68,138,255,0.25);
    letter-spacing:.3px;
  }
  .btn-login::before {
    content:'';position:absolute;inset:0;
    background:linear-gradient(135deg,transparent 0%,rgba(255,255,255,0.12) 50%,transparent 100%);
    opacity:0;transition:opacity .3s;
  }
  .btn-login:hover {
    transform:translateY(-2px);
    box-shadow:0 8px 32px rgba(41,121,255,0.55),0 0 0 1px rgba(68,138,255,0.4);
  }
  .btn-login:hover::before{opacity:1;}
  .btn-login:active{transform:translateY(0);}
  .btn-login:disabled{opacity:.55;cursor:not-allowed;transform:none;}

  /* Loading spinner inside button */
  .btn-login .spinner {
    display:none;width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);
    border-top-color:#fff;border-radius:50%;
    animation:spin .7s linear infinite;
    margin:0 auto;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
  .btn-login.loading .btn-text{display:none;}
  .btn-login.loading .spinner{display:block;}

  /* ── DIVIDER ── */
  .divider {
    display:flex;align-items:center;gap:10px;margin:20px 0 16px;
  }
  .divider::before,.divider::after {
    content:'';flex:1;height:1px;
    background:linear-gradient(90deg,transparent,rgba(41,121,255,0.2),transparent);
  }
  .divider span{font-size:11px;color:rgba(130,177,255,0.35);white-space:nowrap;}

  /* ── FOOTER ── */
  .footer {
    text-align:center;font-size:11px;color:rgba(130,177,255,0.35);
    margin-top:22px;letter-spacing:.3px;
  }
  .footer strong{color:rgba(68,138,255,0.7);}

  /* ── VANISH FADE BOTTOM ── */
  .vanish-bar {
    width:80px;height:2px;border-radius:2px;margin:14px auto 0;
    background:linear-gradient(90deg,transparent,var(--electric),transparent);
    opacity:0.35;
  }
</style>
</head>
<body>

<!-- Animated background -->
<div class="bg-canvas">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
</div>
<div class="bg-grid"></div>

<div class="wrap">

  <!-- Brand -->
  <div class="brand">
    <div class="brand-logo-ring">
      <img src="/raabta-logo.png" alt="Raabta Logo"
           onerror="this.style.display='none';this.nextElementSibling.style.display='block'"/>
      <span class="logo-fallback" style="display:none">RT</span>
    </div>
    <div class="brand-name">Raabta</div>
    <div class="brand-sub">Task Manager</div>
  </div>

  <!-- Card -->
  <div class="card">
    <div class="card-title">Welcome back 👋</div>
    <div class="card-sub">Sign in to your workspace</div>

    <div class="error" id="err"></div>

    <div class="form-group">
      <label for="email">Email Address</label>
      <div class="input-wrap">
        <span class="input-icon">✉</span>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email"/>
      </div>
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <div class="input-wrap">
        <span class="input-icon">🔒</span>
        <input type="password" id="password" placeholder="Enter your password"
               onkeydown="if(event.key==='Enter')login()"/>
      </div>
    </div>

    <button class="btn-login" id="loginBtn" onclick="login()">
      <span class="btn-text">Sign In →</span>
      <div class="spinner"></div>
    </button>

    <div class="footer">
      <strong>Raabta Task Manager</strong> &nbsp;·&nbsp; Secure Workspace
      <div class="vanish-bar"></div>
    </div>
  </div>

</div>

<script>
// Agar already logged in hai toh seedha /app pe bhejo
(async function checkExistingSession() {
  try {
    const r = await fetch('/api/me', { credentials: 'include' });
    if (r.ok) { window.location.replace('/app'); }
  } catch(e) {}
})();

async function login(){
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const err      = document.getElementById('err');
  const btn      = document.getElementById('loginBtn');

  err.style.display = 'none';

  if(!email || !password){
    err.textContent = 'Please fill all fields';
    err.style.display = 'block';
    return;
  }

  btn.classList.add('loading');
  btn.disabled = true;

  try {
    const r = await fetch('/api/login', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      credentials:'include',
      body: JSON.stringify({email, password})
    });
    const d = await r.json();
    if(!r.ok){
      err.textContent = d.error || 'Login failed';
      err.style.display = 'block';
      btn.classList.remove('loading');
      btn.disabled = false;
      return;
    }
    // Token backup for cookie-blocked environments
    if(d.token) localStorage.setItem('authToken', d.token);
    window.location.replace('/app');
  } catch(e) {
    err.textContent = 'Server error. Please try again.';
    err.style.display = 'block';
    btn.classList.remove('loading');
    btn.disabled = false;
  }
}
</script>
</body>
</html>
