<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Raabta Task Manager — Sign In</title>
<meta name="description" content="Sign in to Raabta Task Manager — Premium task delegation and checklist platform."/>
<link rel="icon" type="image/png" href="/raabta-logo.png"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@700;800;900&display=swap" rel="stylesheet"/>
<style>
  :root {
    --deep-bg: radial-gradient(circle at center, #0a1f3d 0%, #050d18 100%);
    --card-gradient: linear-gradient(180deg, #1565C0 0%, #0D47A1 100%);
    --button-bg: #09377a;
    --button-hover: #062b61;
    --input-border: rgba(255, 255, 255, 0.25);
    --input-focus-border: rgba(255, 255, 255, 0.85);
  }

  *{margin:0;padding:0;box-sizing:border-box;}

  body {
    font-family:'Inter',sans-serif;
    background: var(--deep-bg);
    min-height:100vh;
    display:flex;align-items:center;justify-content:center;
    overflow:hidden;
    position:relative;
  }

  /* Glowing background blobs */
  .bg-glow-orbs {
    position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none;
  }
  .bg-orb {
    position:absolute;border-radius:50%;filter:blur(100px);
    opacity:0.3;
  }
  .orb-blue {
    width:350px;height:350px;top:-50px;left:-50px;
    background:radial-gradient(circle, #2979FF, transparent 70%);
  }
  .orb-purple {
    width:450px;height:450px;bottom:-100px;right:-100px;
    background:radial-gradient(circle, #7c4aed, transparent 75%);
  }

  /* Subtle background grid */
  .bg-grid {
    position:fixed;inset:0;z-index:0;pointer-events:none;
    background-image:
      linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size:40px 40px;
  }

  .wrap {
    position:relative;z-index:10;
    width:100%;max-width:350px;padding:16px;
  }

  /* ── BRAND HEADER ── */
  .brand {
    text-align:center;margin-bottom:24px;
    animation:fadeDown .7s cubic-bezier(.34,1.56,.64,1) both;
  }
  .brand-logo-banner {
    width:240px;height:180px;border-radius:20px;margin:0 auto 14px;
    background:#000000;
    display:grid;place-items:center;position:relative;
    box-shadow:
      0 0 0 1.5px rgba(255, 215, 0, 0.65), /* Glowing gold border */
      0 0 12px rgba(255, 215, 0, 0.25),
      0 6px 18px rgba(0,0,0,0.3);
    overflow:hidden;
  }
  .brand-logo-banner img {
    width:100%;height:100%;object-fit:cover;
  }
  .brand-logo-banner .logo-fallback {
    font-family:'Outfit',sans-serif;font-weight:900;font-size:24px;color:#fff;letter-spacing:-1px;
  }
  .brand-name {
    display:none;
  }
  .brand-sub {
    font-family:'Inter',sans-serif;
    margin-top:5px;font-size:11px;font-weight:700;letter-spacing:4px;
    color:rgba(255,255,255,0.85);text-transform:uppercase;
  }

  /* ── CARD — Styled exactly like the phone screen ── */
  .card {
    background: rgba(13, 71, 161, 0.35); /* Elegant semi-transparent glass blue */
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius:28px;
    padding:36px 24px 30px;
    box-shadow:
      0 24px 64px rgba(0, 0, 0, 0.45),
      inset 0 1px 0 rgba(255, 255, 255, 0.2);
    position:relative;overflow:hidden;
    animation:cardIn .65s cubic-bezier(.34,1.56,.64,1) .1s both;
  }

  /* Wavy background graphics inside the card */
  .card-bg-waves {
    position:absolute;inset:0;z-index:0;pointer-events:none;overflow:hidden;
  }
  .card-wave {
    position:absolute;border-radius:40%;width:220%;height:220%;left:-60%;
  }
  .wave1 {
    top:-120%;
    background:radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 60%);
    animation:waveRotate 25s linear infinite;
  }
  .wave2 {
    bottom:-120%;
    background:radial-gradient(circle, rgba(255,255,255,0.06) 0%, transparent 70%);
    animation:waveRotate 30s linear infinite reverse;
  }
  @keyframes waveRotate {
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
  }

  .card-content {
    position:relative;z-index:5;
  }

  .card-title {font-size:19px;font-weight:700;color:#ffffff;margin-bottom:4px;text-align:center;}
  .card-sub {font-size:13px;color:rgba(255,255,255,0.7);margin-bottom:24px;text-align:center;}

  /* ── FORM ── */
  .form-group {margin-bottom:18px;}
  .input-wrap {position:relative;}
  
  .input-icon {
    position:absolute;right:18px;top:50%;transform:translateY(-50%);
    font-size:15px;color:rgba(255,255,255,0.65);pointer-events:none;
    transition:color .2s;
  }
  
  input {
    width:100%;
    padding:12px 46px 12px 20px;
    background:rgba(255, 255, 255, 0.08);
    border:1px solid var(--input-border);
    border-radius:50px;
    font-size:14px;font-family:'Inter',sans-serif;
    color:#ffffff;outline:none;
    transition:all .25s ease;
  }
  input::placeholder{color:rgba(255,255,255,0.45);}
  input:focus {
    border-color:var(--input-focus-border);
    background:rgba(255, 255, 255, 0.15);
    box-shadow:0 0 12px rgba(255, 255, 255, 0.15);
  }
  input:focus ~ .input-icon,
  .input-wrap:focus-within .input-icon { color:#ffffff; }

  /* ── ERROR ── */
  .error {
    display:none;background:rgba(220,38,38,0.25);
    border:1px solid rgba(220,38,38,0.4);
    color:#fca5a5;padding:10px 14px;
    border-radius:12px;font-size:13px;margin-bottom:14px;
    animation:shake .35s ease;text-align:center;
  }
  @keyframes shake {
    0%,100%{transform:translateX(0);}
    25%{transform:translateX(-6px);}
    75%{transform:translateX(6px);}
  }

  /* ── BUTTON ── */
  .btn-login {
    width:100%;padding:13px;margin-top:6px;
    background:linear-gradient(135deg, #1565C0 0%, #0D47A1 100%);
    color:#ffffff;border:none;border-radius:50px;
    font-size:15px;font-weight:700;font-family:'Inter',sans-serif;
    cursor:pointer;position:relative;overflow:hidden;
    transition:all .2s;
    box-shadow:0 4px 15px rgba(21, 101, 192, 0.4), 0 0 0 1px rgba(255, 255, 255, 0.15);
    letter-spacing:.5px;
  }
  .btn-login:hover {
    transform:translateY(-1.5px);
    background:linear-gradient(135deg, #1976D2 0%, #0D47A1 100%);
    box-shadow:0 8px 24px rgba(21, 101, 192, 0.55), 0 0 0 1px rgba(255, 255, 255, 0.25);
  }
  .btn-login:active{transform:translateY(0);}
  .btn-login:disabled{opacity:.55;cursor:not-allowed;transform:none;}

  /* Loading spinner inside button */
  .btn-login .spinner {
    display:none;width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);
    border-top-color:#fff;border-radius:50%;
    animation:spin .7s linear infinite;
    margin:0 auto;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
  .btn-login.loading .btn-text{display:none;}
  .btn-login.loading .spinner{display:block;}

  /* ── FOOTER ── */
  .footer {
    text-align:center;font-size:11px;color:rgba(255,255,255,0.5);
    margin-top:24px;letter-spacing:.3px;
  }
  .footer strong{color:#ffffff;}

  @keyframes cardIn {
    from{opacity:0;transform:translateY(28px) scale(.96);}
    to{opacity:1;transform:translateY(0) scale(1);}
  }
  @keyframes fadeDown {
    from{opacity:0;transform:translateY(-20px);}
    to{opacity:1;transform:translateY(0);}
  }
</style>
</head>
<body>

<div class="bg-glow-orbs">
  <div class="bg-orb orb-blue"></div>
  <div class="bg-orb orb-purple"></div>
</div>
<div class="bg-grid"></div>

<div class="wrap">

  <!-- Brand -->
  <div class="brand">
    <div class="brand-logo-banner">
      <img src="/raabta-logo.png" alt="Raabta Logo"
           onerror="this.style.display='none';this.nextElementSibling.style.display='block'"/>
      <span class="logo-fallback" style="display:none">RT</span>
    </div>
    <div class="brand-sub">Task Manager</div>
  </div>

  <!-- Card -->
  <div class="card">
    <div class="card-bg-waves">
      <div class="card-wave wave1"></div>
      <div class="card-wave wave2"></div>
    </div>

    <div class="card-content">
      <div class="card-title">Welcome back 👋</div>
      <div class="card-sub">Sign in to your workspace</div>

      <div class="error" id="err"></div>

      <div class="form-group">
        <div class="input-wrap">
          <input type="email" id="email" placeholder="Email Address" autocomplete="email" autocapitalize="none" autocorrect="off" required/>
          <span class="input-icon">✉</span>
        </div>
      </div>

      <div class="form-group">
        <div class="input-wrap">
          <input type="password" id="password" placeholder="Password" required onkeydown="if(event.key==='Enter')login()"/>
          <span class="input-icon">🔒</span>
        </div>
      </div>

      <button class="btn-login" id="loginBtn" onclick="login()">
        <span class="btn-text">Sign In</span>
        <div class="spinner"></div>
      </button>

      <div class="footer">
        <strong>Raabta Task Manager</strong> &nbsp;·&nbsp; Secure Workspace
      </div>
    </div>
  </div>

</div>

<script>
// Agar already logged in hai toh seedha /app pe bhejo
(async function checkExistingSession() {
  try {
    const r = await fetch('/api/me', { credentials: 'include' });
    if (r.ok) { window.location.replace('/app'); }
  } catch(e) {}
})();

async function login(){
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const err      = document.getElementById('err');
  const btn      = document.getElementById('loginBtn');

  err.style.display = 'none';

  if(!email || !password){
    err.textContent = 'Please fill all fields';
    err.style.display = 'block';
    return;
  }

  btn.classList.add('loading');
  btn.disabled = true;

  try {
    const r = await fetch('/api/login', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      credentials:'include',
      body: JSON.stringify({email, password})
    });
    const d = await r.json();
    if(!r.ok){
      err.textContent = d.error || 'Login failed';
      err.style.display = 'block';
      btn.classList.remove('loading');
      btn.disabled = false;
      return;
    }
    // Token backup for cookie-blocked environments
    if(d.token) localStorage.setItem('authToken', d.token);
    window.location.replace('/app');
  } catch(e) {
    err.textContent = 'Server error. Please try again.';
    err.style.display = 'block';
    btn.classList.remove('loading');
    btn.disabled = false;
  }
}
</script>
</body>
</html>
